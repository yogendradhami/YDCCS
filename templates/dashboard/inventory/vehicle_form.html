{% extends "dashboard_base.html" %}

{% block content %}

<div class="dashboard-card">

    <div class="crm-panel-header">
        <h1>{{ title }}</h1>

        <a href="{% url 'vehicle_list' %}" class="btn-outline">
            Back to Vehicles
        </a>
    </div>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn-fill">
            Save Vehicle
        </button>
    </form>

</div>

{% endblock %}
