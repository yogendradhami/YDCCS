{% extends "dashboard_base.html" %}

{% block title %}
{{ page_title }}
{% endblock %}

{% block content %}

<div class="dashboard-card">

    <h1>{{ page_title }}</h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn-fill">
            {{ button_text }}
        </button>

    </form>

</div>

{% endblock %}
