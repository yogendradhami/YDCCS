{% extends 'base.html' %}

{% block title %}Admin Dashboard Login{% endblock %}

{% block content %}

<section style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;">

    <div style="width:100%;max-width:420px;background:white;padding:35px;border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,.12);">

        <h1 style="margin-bottom:10px;text-align:center;">
            Admin Dashboard Login
        </h1>

        <p style="text-align:center;margin-bottom:25px;color:#64748b;">
            YD Commercial Cleaning Services
        </p>

        {% if messages %}
            {% for message in messages %}
                <div style="background:#fee2e2;color:#991b1b;padding:12px;border-radius:10px;margin-bottom:15px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div style="margin-bottom:15px;">
                <label>Username</label>
                <input
                    type="text"
                    name="username"
                    required
                    style="width:100%;padding:13px;border:1px solid #cbd5e1;border-radius:10px;margin-top:6px;"
                >
            </div>

            <div style="margin-bottom:20px;">
                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    required
                    style="width:100%;padding:13px;border:1px solid #cbd5e1;border-radius:10px;margin-top:6px;"
                >
            </div>

            <button
                type="submit"
                style="width:100%;padding:14px;border:0;border-radius:12px;background:#dc2626;color:white;font-weight:700;cursor:pointer;"
            >
                Login to Dashboard
            </button>
        </form>

    </div>

</section>

{% endblock %}
