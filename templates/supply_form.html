{% extends "dashboard_base.html" %}

{% block title %}
{{ title }}
{% endblock %}

{% block content %}

<div class="dashboard-card">

    <div class="crm-panel-header">
        <div>
            <h1>{{ title }}</h1>
            <p>Add or update cleaning supply stock details.</p>
        </div>

        <a href="{% url 'supplies_list' %}" class="btn-outline">
            Back to Supplies
        </a>
    </div>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn-fill">
            Save Supply
        </button>
    </form>

</div>

{% endblock %}
