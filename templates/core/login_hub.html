{% extends 'base.html' %}

{% block title %}Login | YD Commercial Cleaning Services{% endblock %}

{% block content %}

<section style="padding:80px 20px;">

    <div style="max-width:900px;margin:auto;">

        <h1 style="text-align:center;margin-bottom:15px;">
            Welcome Back
        </h1>

        <p style="text-align:center;margin-bottom:40px;">
            Select your portal
        </p>

        <div style="
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
        ">

            <a href="/portal/login/" style="
                padding:30px;
                background:#2563eb;
                color:white;
                text-decoration:none;
                border-radius:16px;
                text-align:center;
            ">
                <h2>Customer Portal</h2>
                <p>Bookings, invoices, reports</p>
            </a>

            <a href="/employee/login/" style="
                padding:30px;
                background:#16a34a;
                color:white;
                text-decoration:none;
                border-radius:16px;
                text-align:center;
            ">
                <h2>Employee Portal</h2>
                <p>Jobs, schedules, attendance</p>
            </a>

            <a href="/dashboard/login/" style="
                padding:30px;
                background:#dc2626;
                color:white;
                text-decoration:none;
                border-radius:16px;
                text-align:center;
            ">
                <h2>Admin Portal</h2>
                <p>Business management</p>
            </a>

        </div>

    </div>

</section>

{% endblock %}
