{% extends 'base.html' %}

{% block title %}
Reset Password | YD Commercial Cleaning
{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-card">
            <div class="auth-brand">
                <h1>Forgot Password?</h1>
                <p>Enter your email and we will send a reset link.</p>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label>Email Address</label>
                    {{ form.email }}
                    <div class="text-danger">{{ form.email.errors }}</div>
                </div>

                <button type="submit" class="btn-fill full-width">
                    Send Reset Link
                </button>

                <div class="auth-links center">
                    <a href="/portal/login/">Back to login</a>
                </div>
            </form>
        </div>

    </div>
</section>

{% endblock %}
